{% extends "base.html" %} {% block content %} {% load static %}
<main class="main">
  <h1 id="proposalHeading" class="title">Do you want to go out with me?</h1>
  <canvas id="heartCanvas" class="heart-canvas" aria-label="A glowing heart"></canvas>
  {% include "includes/forms/response_form.html" %}
</main>

<!-- Custom name prompt (replaces the ugly native prompt dialog) -->
<div class="name-modal" id="nameModal">
  <form class="name-card pop-in" id="nameCard">
    <h2 class="name-title">Hi there! 💕</h2>
    <p class="name-sub">What should I call you?</p>
    <input
      type="text"
      id="nameInput"
      class="name-input"
      placeholder="Your name..."
      autocomplete="off"
      maxlength="40"
    />
    <button type="submit" class="btn name-btn">Continue ❤️</button>
  </form>
</div>
{% endblock %}
