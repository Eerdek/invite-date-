<form action="{% url 'index' %}" method="POST" class="proposalForm" id="proposalForm">
  {% csrf_token %}

  <input type="hidden" name="name" id="username" value="{{ name }}" />

  <!-- Only "Yes" submits. "No" is a plain button that runs away (see script.js). -->
  <button type="submit" name="response" value="Yes" class="btn btn-yes" id="yesBtn">
    ❤️ Yes
  </button>
  <button type="button" class="btn btn-no" id="noBtn">💔 No</button>
</form>
